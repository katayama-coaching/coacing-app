<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNER COMPASS - AI Coaching</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e4dc;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}
textarea::placeholder{color:#3a3848}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.28}40%{transform:translateY(-5px);opacity:1}}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
#app{flex:1;display:flex;flex-direction:column;max-width:780px;width:100%;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid #1e1e30;background:#0d0d14;position:sticky;top:0;z-index:50;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px}
.logo-box{width:24px;height:24px;border-radius:6px;background:#c8a96e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0a0a0f}
.logo-name{font-size:12px;font-weight:700;letter-spacing:.18em;color:#e8e4dc}
.logo-badge{font-size:9px;font-weight:700;letter-spacing:.12em;color:#c8a96e;border:1px solid rgba(200,169,110,.4);padding:2px 7px;border-radius:3px;background:rgba(200,169,110,.08)}
.hdr-right{display:flex;gap:8px;align-items:center}
.hdr-btn{background:none;border:1px solid #2a2a3e;color:#7a7880;font-size:11px;cursor:pointer;padding:5px 13px;border-radius:20px;font-family:inherit}
#err-bar{display:none;background:rgba(240,92,92,.1);border-bottom:1px solid rgba(240,92,92,.3);color:#f05c5c;font-size:11px;padding:7px 20px;align-items:center;justify-content:space-between}
.err-close{background:none;border:none;color:#f05c5c;cursor:pointer;font-size:15px}
#welcome{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 20px}
.welcome-inner{max-width:540px;width:100%}
.hero{text-align:center;margin-bottom:24px}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.3);border-radius:100px;padding:5px 14px;margin-bottom:16px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#3ecf8e;animation:pulse 2s infinite;flex-shrink:0}
.badge-lbl{font-size:10px;color:#c8a96e;font-weight:700;letter-spacing:.14em}
.hero h1{font-size:30px;font-weight:300;line-height:1.45;margin:0 0 10px;color:#e8e4dc}
.hero h1 b{font-weight:700;color:#c8a96e}
.hero p{font-size:13px;color:#7a7880;line-height:1.8}
.starters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.s-btn{background:#111120;border:1px solid #1e1e30;border-radius:10px;padding:11px 13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:9px;text-align:left;color:#e8e4dc;transition:border-color .15s,background .15s}
.s-btn:hover{border-color:rgba(200,169,110,.45);background:rgba(200,169,110,.07)}
.s-emoji{font-size:16px;flex-shrink:0}
.s-txt{font-size:12px;line-height:1.35}
.free-btn{display:block;width:100%;background:#111120;border:1px solid #2a2a3e;color:#c8a96e;font-size:13px;font-weight:500;padding:12px 0;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.04em;margin-bottom:14px}
.feats{display:flex;border-top:1px solid #1e1e30;padding-top:18px}
.feat{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;padding:0 8px}
.feat-ic{font-size:14px;color:#c8a96e}
.feat-lb{font-size:11px;font-weight:700;color:#e8e4dc}
.feat-dc{font-size:10px;color:#5a5868;line-height:1.4}
#chat{flex:1;display:none;flex-direction:column}
.chat-meta{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid #1e1e30;flex-shrink:0}
.meta-left{display:flex;align-items:center;gap:7px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#3ecf8e;box-shadow:0 0 6px #3ecf8e88}
.meta-lbl{font-size:11px;color:#7a7880}
.meta-right{font-size:10px;color:#3a3848}
.progress-track{height:2px;background:#1e1e30;flex-shrink:0}
.progress-fill{height:2px;background:#c8a96e;transition:width .7s ease}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:13px;padding:16px 20px}
.row-u{display:flex;justify-content:flex-end;animation:fadein .22s ease}
.row-a{display:flex;align-items:flex-start;gap:9px;animation:fadein .22s ease}
.av{width:30px;height:30px;border-radius:50%;background:#c8a96e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0a0a0f;flex-shrink:0}
.bu{background:#161628;border:1px solid #252538;border-radius:13px 13px 3px 13px;padding:11px 15px;max-width:78%;font-size:13px;line-height:1.8;color:#e8e4dc;white-space:pre-wrap;word-break:break-word}
.ba{background:#111120;border:1px solid #1e1e30;border-radius:3px 13px 13px 13px;padding:12px 16px;font-size:13px;line-height:1.85;color:#e8e4dc;white-space:pre-wrap;word-break:break-word}
.asst-col{display:flex;flex-direction:column;gap:8px;max-width:82%}
.quick-row{display:flex;flex-wrap:wrap;gap:5px}
.qbtn{background:none;border:1px solid #252538;border-radius:100px;padding:4px 12px;font-size:11px;color:#7a7880;cursor:pointer;font-family:inherit}
.dots-wrap{background:#111120;border:1px solid #1e1e30;border-radius:3px 13px 13px 13px;padding:13px 16px;display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:#c8a96e;animation:bounce 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.16s}
.dot:nth-child(3){animation-delay:.32s}
.input-area{flex-shrink:0;padding:10px 16px 14px;background:#0d0d14;border-top:1px solid #1e1e30}
.input-wrap{border:1px solid #2a2a3e;border-radius:12px;overflow:hidden;background:#111120;transition:border-color .18s,box-shadow .18s}
.input-wrap.focus{border-color:rgba(200,169,110,.65);box-shadow:0 0 0 3px rgba(200,169,110,.1)}
#ta{display:block;width:100%;background:transparent;border:none;outline:none;color:#e8e4dc;font-size:14px;line-height:1.65;resize:none;font-family:inherit;padding:12px 15px 0;min-height:48px;max-height:130px;overflow-y:auto}
.input-foot{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 9px}
.char-lbl{font-size:10px;color:#3a3848}
#send-btn{background:#c8a96e;border:none;border-radius:7px;color:#0a0a0f;font-size:12px;font-weight:700;padding:7px 18px;cursor:pointer;font-family:inherit}
#send-btn:disabled{opacity:.32;cursor:not-allowed}
.pay-btn{display:block;width:100%;background:linear-gradient(135deg,#c8a96e,#e8c98e);border:none;color:#0a0a0f;font-size:15px;font-weight:800;padding:16px 0;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.04em;margin-bottom:10px;box-shadow:0 4px 20px rgba(200,169,110,.35)}
.pay-btn:hover{opacity:.9}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}
.portal-btn{display:block;width:100%;background:none;border:1px solid #2a2a3e;color:#7a7880;font-size:12px;padding:10px 0;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.04em;margin-bottom:10px;transition:border-color .2s,color .2s}
.portal-btn:hover{border-color:rgba(200,169,110,.4);color:#c8a96e}
.portal-btn:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-box">C</div>
      <span class="logo-name">INNER COMPASS</span>
      <span class="logo-badge">AI COACHING</span>
    </div>
    <div class="hdr-right">
      <span id="ses-tag" style="font-size:10px;color:#3a3848;display:none"></span>
      <button class="hdr-btn" id="new-btn" style="display:none" onclick="resetApp()">+ 新セッション</button>
    </div>
  </header>
  <div id="err-bar">
    <span id="err-msg"></span>
    <button class="err-close" onclick="document.getElementById('err-bar').style.display='none'">×</button>
  </div>
  <div id="welcome">
    <div class="welcome-inner">
      <div class="hero">
        <div class="hero-badge"><div class="live-dot"></div><span class="badge-lbl">AI COACHING SESSION</span></div>
        <h1>あなたの内側に<br><b>答えはある。</b></h1>
        <p>思考を整理し、本当にやりたいことを見つけよう。</p>
      </div>
      <div class="starters">
        <button class="s-btn" onclick="begin('仕事のモヤモヤを整理したい')"><span class="s-emoji">💼</span><span class="s-txt">仕事のモヤモヤを整理したい</span></button>
        <button class="s-btn" onclick="begin('目標が定まらない')"><span class="s-emoji">🎯</span><span class="s-txt">目標が定まらない</span></button>
        <button class="s-btn" onclick="begin('人間関係で悩んでいる')"><span class="s-emoji">👥</span><span class="s-txt">人間関係で悩んでいる</span></button>
        <button class="s-btn" onclick="begin('キャリアの転換期にある')"><span class="s-emoji">🔀</span><span class="s-txt">キャリアの転換期にある</span></button>
        <button class="s-btn" onclick="begin('自分の強みがわからない')"><span class="s-emoji">✨</span><span class="s-txt">自分の強みがわからない</span></button>
        <button class="s-btn" onclick="begin('やる気が出ない・燃え尽きた')"><span class="s-emoji">⚡</span><span class="s-txt">やる気が出ない・燃え尽きた</span></button>
      </div>
      <button class="pay-btn" id="pay-btn" onclick="startCheckout()">🔓 月額¥1,980で始める（7日間無料）</button>
      <button class="portal-btn" id="portal-btn" style="display:none" onclick="openPortal()">⚙️ 契約内容・解約・請求を管理する</button>
      <button class="free-btn" onclick="begin(null)">テーマなしで自由に話す →</button>
      <div class="feats">
        <div class="feat"><span class="feat-ic">◈</span><span class="feat-lb">GROWモデル</span><span class="feat-dc">目標→現状→選択肢→行動</span></div>
        <div class="feat"><span class="feat-ic">◉</span><span class="feat-lb">完全非公開</span><span class="feat-dc">記録・共有されません</span></div>
        <div class="feat"><span class="feat-ic">◇</span><span class="feat-lb">24時間対応</span><span class="feat-dc">いつでも壁打ち可能</span></div>
      </div>
    </div>
  </div>
  <div id="chat">
    <div class="chat-meta">
      <div class="meta-left"><div class="status-dot"></div><span class="meta-lbl" id="phase-lbl">セッション開始</span></div>
      <span class="meta-right" id="exch-lbl">0往復</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="msgs" id="msgs"></div>
    <div class="input-area">
      <div class="input-wrap" id="iw">
        <textarea id="ta" rows="1" placeholder="あなたの思いを自由に話してください…"></textarea>
        <div class="input-foot">
          <span class="char-lbl" id="char-lbl">Shift+Enter で改行</span>
          <button id="send-btn" disabled onclick="send()">送信</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var SYSTEM='あなたは一流のエグゼクティブコーチです。答えを与えるのではなく、強力な質問でクライアント自身の気づきを引き出す。GROWモデルを意識する。批判や判断は絶対にしない。1回の返答に質問は必ず1つだけ。温かく、プロフェッショナル、日本語で。返答は3〜5文程度、簡潔かつ本質的に。';
var QUICK=['もう少し深く掘り下げてください','具体的な例を挙げると…','正直に言うと…','一番大切なのは…'];
var PHASES=['','最初の一歩','深まってきた','核心に近づいている','重要な気づき','本質が見えてきた'];
var msgs=[],busy=false,sesN=0,exchanges=0,composing=false;

// カスタマーポータル関連
(function(){
  var params=new URLSearchParams(window.location.search);
  var sessionId=params.get('session_id');
  if(sessionId){
    fetch('/api/stripe/session?session_id='+sessionId)
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.customerId){
          localStorage.setItem('stripe_customer_id',data.customerId);
          showPortalBtn();
        }
      })
      .catch(function(){});
    window.history.replaceState({},'','/');
  }
  if(localStorage.getItem('stripe_customer_id')){showPortalBtn();}
})();

function showPortalBtn(){
  var btn=document.getElementById('portal-btn');
  if(btn)btn.style.display='block';
}

function openPortal(){
  var customerId=localStorage.getItem('stripe_customer_id');
  if(!customerId){alert('お客様情報が見つかりません。\nサポート: ookura6882@gmail.com');return;}
  var btn=document.getElementById('portal-btn');
  btn.disabled=true;btn.textContent='読み込み中...';
  fetch('/api/stripe/portal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customerId:customerId})})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.url){window.location.href=data.url;}
      else{alert('エラー: '+(data.error||'不明'));btn.disabled=false;btn.textContent='⚙️ 契約内容・解約・請求を管理する';}
    }).catch(function(e){alert('通信エラー: '+e.message);btn.disabled=false;btn.textContent='⚙️ 契約内容・解約・請求を管理する';});
}

// チャット機能
function callAPI(history){
  var cleaned=[];
  for(var i=0;i<history.length;i++){var m=history[i];if(m&&m.role&&typeof m.content==='string'&&m.content.trim()){cleaned.push({role:m.role,content:m.content.trim()});}}
 var isSubscribed=!!localStorage.getItem('stripe_customer_id');return fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:cleaned,system:SYSTEM,isSubscribed:isSubscribed,exchanges:exchanges})}).then(function(r){return r.json();})
function showErr(msg){document.getElementById('err-msg').textContent=msg;document.getElementById('err-bar').style.display='flex';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function updateMeta(){var lbl=PHASES[Math.min(exchanges,PHASES.length-1)]||'セッション継続中';document.getElementById('phase-lbl').textContent=lbl;document.getElementById('exch-lbl').textContent=exchanges>0?exchanges+'往復':'開始前';document.getElementById('prog').style.width=Math.min((exchanges/6)*100,100)+'%';}
function removeQuicks(){var qs=document.querySelectorAll('.quick-row');for(var i=0;i<qs.length;i++)qs[i].remove();}
function appendMsg(role,content,showQuick){var wrap=document.getElementById('msgs');var d=document.createElement('div');if(role==='user'){d.className='row-u';d.innerHTML='<div class="bu">'+esc(content)+'</div>';}else{d.className='row-a';var qhtml='';if(showQuick){qhtml='<div class="quick-row">';for(var i=0;i<QUICK.length;i++){qhtml+='<button class="qbtn" onclick="quickSend(\''+QUICK[i].replace(/'/g,"\\'")+'\')">'+ esc(QUICK[i])+'</button>';}qhtml+='</div>';}d.innerHTML='<div class="av">C</div><div class="asst-col"><div class="ba">'+esc(content)+'</div>'+qhtml+'</div>';}wrap.appendChild(d);wrap.scrollTop=wrap.scrollHeight;}
function showTyping(){var wrap=document.getElementById('msgs');var d=document.createElement('div');d.id='typing';d.className='row-a';d.innerHTML='<div class="av">C</div><div class="dots-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';wrap.appendChild(d);wrap.scrollTop=wrap.scrollHeight;}
function hideTyping(){var el=document.getElementById('typing');if(el)el.remove();}
function setBusy(b){busy=b;if(b)showTyping();else hideTyping();updateSendBtn();}
function updateSendBtn(){document.getElementById('send-btn').disabled=!document.getElementById('ta').value.trim()||busy;}
function resetApp(){msgs=[];exchanges=0;busy=false;document.getElementById('msgs').innerHTML='';document.getElementById('welcome').style.display='flex';document.getElementById('chat').style.display='none';document.getElementById('new-btn').style.display='none';document.getElementById('ses-tag').style.display='none';document.getElementById('err-bar').style.display='none';document.getElementById('ta').value='';updateSendBtn();}
function begin(topic){sesN++;msgs=[];exchanges=0;document.getElementById('welcome').style.display='none';document.getElementById('chat').style.display='flex';document.getElementById('new-btn').style.display='block';document.getElementById('ses-tag').textContent='Session #'+sesN;document.getElementById('ses-tag').style.display='block';document.getElementById('msgs').innerHTML='';updateMeta();var firstMsg=topic||'コーチングセッションを始めてください。';var history=[{role:'user',content:firstMsg}];if(topic){msgs.push({role:'user',content:firstMsg});appendMsg('user',firstMsg);}setBusy(true);callAPI(history).then(function(reply){msgs.push({role:'assistant',content:reply});appendMsg('assistant',reply,true);exchanges++;updateMeta();setBusy(false);document.getElementById('ta').focus();}).catch(function(e){showErr(e.message);setBusy(false);});}
function send(textOverride){if(sesN>=3){document.getElementById('msgs').innerHTML+='<div class="row-a"><div class="av">C</div><div class="msg-wrap"><div class="msg">3回の無料体験が終了しました。<br>続けてご利用いただくには、サブスクリプション登録が必要です。<br><br><button onclick="startCheckout()" style="background:#c8a96e;color:#0d0d14;border:none;padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:700;">今すぐ登録する（月額¥1,980）</button></div></div></div>';return;}var text=(textOverride||document.getElementById('ta').value).trim();if(!text||busy)return;removeQuicks();document.getElementById('ta').value='';document.getElementById('ta').style.height='auto';updateSendBtn();msgs.push({role:'user',content:text});appendMsg('user',text);setBusy(true);callAPI(msgs).then(function(reply){msgs.push({role:'assistant',content:reply});appendMsg('assistant',reply,true);exchanges++;updateMeta();setBusy(false);document.getElementById('ta').focus();}).catch(function(e){showErr(e.message);setBusy(false);});}
function quickSend(text){send(text);}
var ta=document.getElementById('ta');var iw=document.getElementById('iw');
ta.addEventListener('input',function(){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,130)+'px';document.getElementById('char-lbl').textContent=ta.value.length>0?ta.value.length+'文字':'Shift+Enter で改行';updateSendBtn();});
ta.addEventListener('focus',function(){iw.classList.add('focus');});
ta.addEventListener('blur',function(){iw.classList.remove('focus');});
ta.addEventListener('compositionstart',function(){composing=true;});
ta.addEventListener('compositionend',function(){composing=false;});
ta.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey&&!composing){e.preventDefault();send();}});
function startCheckout(){var btn=document.getElementById('pay-btn');btn.disabled=true;btn.textContent='処理中...';fetch('/api/stripe/checkout',{method:'POST',headers:{'Content-Type':'application/json'}}).then(function(r){return r.json();}).then(function(data){if(data.url){window.location.href=data.url;}else{alert('エラー: '+(data.error||'不明'));btn.disabled=false;btn.textContent='🔓 月額¥1,980で始める';}}).catch(function(e){alert('通信エラー: '+e.message);btn.disabled=false;btn.textContent='🔓 月額¥1,980で始める（7日間無料）';});}
</script>
<div style="text-align:center;padding:20px;border-top:1px solid #1e1e30;margin-top:10px">
  <a href="/tokushoho.html" style="font-size:11px;color:#3a3848;text-decoration:none;letter-spacing:.08em;">
    特定商取引法に基づく表記 / 利用規約 / プライバシーポリシー
  </a>
</div></body>
</html>
